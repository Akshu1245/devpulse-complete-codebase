services:
  - type: web
    name: rakshex-backend
    env: docker
    dockerfilePath: ./Dockerfile.render
    region: singapore
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard
      - key: REDIS_URL
        fromService:
          name: rakshex-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://rakshex-frontend.vercel.app"
      - key: APP_URL
        value: "https://rakshex-backend.onrender.com"
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: "noreply@rakshex.in"
      - key: GITHUB_APP_ID
        value: ""
      - key: GITHUB_APP_PRIVATE_KEY
        value: ""
      - key: GITHUB_WEBHOOK_SECRET
        value: ""
      - key: SENTRY_DSN
        value: ""
      - key: RAZORPAY_KEY_ID
        value: ""
      - key: RAZORPAY_KEY_SECRET
        value: ""
      - key: RAZORPAY_WEBHOOK_SECRET
        value: ""
      - key: SLACK_WEBHOOK_URL
        value: ""
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true

  - name: rakshex-redis
    type: redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru