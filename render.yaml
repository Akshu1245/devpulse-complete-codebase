services:
  - type: web
    name: devpulse-backend
    env: docker
    dockerfilePath: ./Dockerfile
    buildCommand: pnpm install && pnpm run build
    startCommand: node dist/server/_core/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: devpulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: devpulse-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: GITHUB_APP_ID
        value: ""
      - key: GITHUB_APP_PRIVATE_KEY
        value: ""
      - key: GITHUB_WEBHOOK_SECRET
        value: ""
      - key: SENTRY_DSN
        value: ""
    healthCheckPath: /api/health
    autoDeploy: true

  - name: devpulse-redis
    type: redis
    plan: starter
    ipAllowList: []

databases:
  - name: devpulse-db
    type: mysql
    plan: starter