version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: rakshex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rakshex
      POSTGRES_PASSWORD: rakshex
      POSTGRES_DB: rakshex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rakshex -d rakshex"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rakshex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      target: worker
    container_name: rakshex-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql://rakshex:rakshex@mysql:3306/rakshex
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-do-not-use-in-production}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-}
      - NODE_ENV=${NODE_ENV:-production}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-3}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Optional: Jaeger for local trace visualization
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: rakshex-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
  redis_data:
